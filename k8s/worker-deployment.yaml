apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: raytracer
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
      - name: wait-for-rabbitmq
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv rabbitmq-service 5672; do echo waiting for rabbitmq; sleep 2; done']
      - name: wait-for-web
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv web-service 8000; do echo waiting for web; sleep 2; done']
      - name: wait-for-minio
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv minio-service 9000; do echo waiting for minio; sleep 2; done']
      containers:
      - name: worker
        image: raytracer-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: RABBITMQ_URL
        - name: RABBITMQ_QUEUE
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: RABBITMQ_QUEUE
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: MINIO_ENDPOINT
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: MINIO_SECRET_KEY
        - name: MINIO_BUCKET
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: MINIO_BUCKET
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: API_BASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
