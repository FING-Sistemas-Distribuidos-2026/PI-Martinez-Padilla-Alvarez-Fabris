apiVersion: v1
kind: Secret
metadata:
  name: raytracer-secrets
  namespace: raytracer
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  DATABASE_URL: postgresql://postgres:postgres@postgres-service:5432/raytracer
  RABBITMQ_URL: amqp://guest:guest@rabbitmq-service:5672/%2F
