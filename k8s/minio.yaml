apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: raytracer
spec:
  storageClassName: csi-cinder-sc-delete
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: raytracer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest

          args:
            - server
            - /data

          ports:
            - containerPort: 9000

          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: raytracer-secret
                  key: MINIO_ROOT_USER

            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: raytracer-secret
                  key: MINIO_ROOT_PASSWORD

          volumeMounts:
            - name: minio-storage
              mountPath: /data

      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: raytracer
spec:
  selector:
    app: minio

  ports:
    - name: api
      port: 9000
      targetPort: 9000

  type: ClusterIP