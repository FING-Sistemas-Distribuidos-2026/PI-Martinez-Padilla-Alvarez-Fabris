apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: raytracer
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv postgres-service 5432; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-rabbitmq
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv rabbitmq-service 5672; do echo waiting for rabbitmq; sleep 2; done']
      - name: wait-for-minio
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -zv minio-service 9000; do echo waiting for minio; sleep 2; done']
      containers:
      - name: web
        image: raytracer-webapp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: DATABASE_URL
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: RABBITMQ_URL
        - name: RABBITMQ_QUEUE
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: RABBITMQ_QUEUE
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: MINIO_ENDPOINT
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: raytracer-secrets
              key: MINIO_SECRET_KEY
        - name: MINIO_BUCKET
          valueFrom:
            configMapKeyRef:
              name: raytracer-config
              key: MINIO_BUCKET
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: raytracer
  labels:
    app: web
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: web

---
apiVersion: v1
kind: Service
metadata:
  name: web-external
  namespace: raytracer
  labels:
    app: web
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30000
    protocol: TCP
    name: http
  selector:
    app: web
