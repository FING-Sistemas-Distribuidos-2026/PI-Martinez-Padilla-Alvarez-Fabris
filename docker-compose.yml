services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: raytracer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raytracer"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/raytracer
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_QUEUE: render_jobs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./webapp/backend/uploads:/webapp/backend/uploads

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_QUEUE: render_jobs
      RENDERER_PATH: /app/renderer/renderer
      SCENES_FOLDER: /tmp/scenes
      OUTPUT_FOLDER: /app/renders
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./worker/renders:/app/renders

volumes:
  postgres_data: